# ============================================================
# Nginx Reverse Proxy Configuration
# Routes: Grafana, Kibana, Kafka UI, Prometheus, Alertmanager
# ============================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
      '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── Performance ─────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ─── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Rate Limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream Definitions ────────────────────────────
    upstream grafana_backend {
        server grafana:3000;
        keepalive 32;
    }

    upstream kibana_backend {
        server kibana:5601;
        keepalive 16;
    }

    upstream kafka_ui_backend {
        server kafka-ui:8080;
        keepalive 8;
    }

    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 8;
    }

    upstream alertmanager_backend {
        server alertmanager:9093;
        keepalive 8;
    }

    upstream health_monitor_backend {
        server health-monitor:8000;
        keepalive 8;
    }

    upstream jenkins_backend {
        server jenkins:8080;
        keepalive 16;
    }

    # ─── Default Server (catch-all redirect) ──────────────
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        location / {
            return 302 /grafana/;
        }
    }

    # ─── Grafana ──────────────────────────────────────────
    server {
        listen 80;
        server_name grafana.monitoring.local;

        location / {
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }
    }

    # ─── Path-based routing for single host ──────────────
    server {
        listen 80;
        server_name localhost monitoring.local;

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }

        # Kibana — Log Analysis
        location /kibana/ {
            proxy_pass http://kibana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }

        # Kafka UI — Stream Management
        location /kafka-ui/ {
            proxy_pass http://kafka_ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=api burst=20 nodelay;
        }

        # Prometheus — Internal access (with basic auth)
        location /prometheus/ {
            auth_basic "Prometheus";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://prometheus_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Alertmanager — Internal access (with basic auth)
        location /alertmanager/ {
            auth_basic "Alertmanager";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://alertmanager_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health Monitor metrics / health
        location /monitor/ {
            proxy_pass http://health_monitor_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Jenkins CI/CD
        location /jenkins/ {
            proxy_pass http://jenkins_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300;
        }

        # System health check
        location /health {
            return 200 '{"status":"healthy","proxy":"nginx","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # Static landing page
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
    }
}
