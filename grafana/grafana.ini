# ============================================================
# Grafana Configuration
# ============================================================

[server]
protocol = http
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/
serve_from_sub_path = false
enable_gzip = true

[database]
type = sqlite3
path = grafana.db
log_queries = false

[session]
provider = file
provider_config = sessions
cookie_name = grafana_sess
cookie_secure = false
session_life_time = 86400
gc_interval_time = 86400

[security]
admin_user = admin
admin_password = Admin@Secure123
secret_key = SW2YcwTIb9zpOOhoPsMm
login_remember_days = 7
cookie_username = grafana_user
cookie_remember_name = grafana_remember
disable_gravatar = true
strict_transport_security = false
x_content_type_options = true
x_xss_protection = true
content_security_policy = false

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer
default_theme = dark
viewers_can_edit = false
editors_can_admin = false

[auth]
login_cookie_name = grafana_session
login_maximum_inactive_lifetime_duration = 30d
login_maximum_lifetime_duration = 30d
disable_login_form = false
disable_signout_menu = false
signout_redirect_url =
oauth_auto_login = false

[auth.anonymous]
enabled = false

[snapshots]
external_enabled = false

[dashboards]
versions_to_keep = 20
min_refresh_interval = 5s
default_home_dashboard_path =

[alerting]
enabled = true
execute_alerts = true
error_or_timeout = alerting
nodata_or_nullvalues = no_data
concurrent_render_limit = 5

[unified_alerting]
enabled = true

[log]
mode = console
level = info

[log.console]
level = info
format = json

[metrics]
enabled = true
interval_seconds = 10

[tracing.jaeger]
always_included_tag = app:grafana

[analytics]
reporting_enabled = false
check_for_updates = false
feedback_links_enabled = false

[plugins]
enable_alpha = false
allow_loading_unsigned_plugins = grafana-clock-panel,grafana-simple-json-datasource

[feature_toggles]
enable = publicDashboards

[smtp]
enabled = false
host = smtp.gmail.com:587
user = admin@monitoring.local
password =
cert_file =
key_file =
skip_verify = false
from_address = admin@monitoring.local
from_name = Grafana Alerts
startTLS_policy = OpportunisticStartTLS
