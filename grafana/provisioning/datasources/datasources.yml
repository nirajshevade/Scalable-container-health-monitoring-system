apiVersion: 1

datasources:
  # ─── Prometheus — Primary Metrics Source ─────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus-main
    isDefault: true
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.48.0
      cacheLevel: High
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: jaeger
    editable: true

  # ─── Alertmanager — Alert State Source ───────────────────
  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    uid: alertmanager-main
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: false
    editable: true

  # ─── Elasticsearch — Log Data Source ─────────────────────
  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    uid: elasticsearch-main
    database: container-logs-*
    basicAuth: true
    basicAuthUser: elastic
    secureJsonData:
      basicAuthPassword: Elastic@Secure123
    jsonData:
      index: container-logs-*
      timeField: "@timestamp"
      esVersion: "8.11.0"
      logMessageField: message
      logLevelField: level
      maxConcurrentShardRequests: 5
    editable: true
