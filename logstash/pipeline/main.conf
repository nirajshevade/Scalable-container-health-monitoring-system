# ============================================================
# Logstash Pipeline Configuration
# Sources: Kafka topics (container-health-events, container-alert-events, container-log-events)
# Destination: Elasticsearch
# ============================================================

input {
  # ─── Container Health Events from Kafka ────────────────
  kafka {
    id => "kafka-health-events"
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics => ["container-health-events"]
    group_id => "logstash-health-consumer"
    consumer_threads => 2
    codec => json
    auto_offset_reset => "earliest"
    session_timeout_ms => "30000"
    request_timeout_ms => "40000"
    decorate_events => "extended"
    tags => ["kafka", "health-event"]
  }

  # ─── Container Alert Events from Kafka ─────────────────
  kafka {
    id => "kafka-alert-events"
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics => ["container-alert-events"]
    group_id => "logstash-alert-consumer"
    consumer_threads => 1
    codec => json
    auto_offset_reset => "earliest"
    decorate_events => "extended"
    tags => ["kafka", "alert-event"]
  }

  # ─── Container Log Events from Kafka ───────────────────
  kafka {
    id => "kafka-log-events"
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics => ["container-log-events"]
    group_id => "logstash-log-consumer"
    consumer_threads => 2
    codec => json
    auto_offset_reset => "earliest"
    decorate_events => "extended"
    tags => ["kafka", "log-event"]
  }

  # ─── Beats Input (for future Filebeat/Metricbeat) ──────
  beats {
    id => "beats-input"
    port => 5044
    ssl => false
    tags => ["beats"]
  }

  # ─── TCP Syslog Input ───────────────────────────────────
  tcp {
    id => "tcp-syslog"
    port => 5000
    codec => json_lines
    tags => ["syslog", "tcp"]
  }
}

# ============================================================
filter {
  # ─── Parse Timestamp ─────────────────────────────────────
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # ─── Enrich Health Events ────────────────────────────────
  if "health-event" in [tags] {
    mutate {
      add_field => {
        "event_category" => "container_health"
        "index_prefix" => "container-health"
      }
    }

    # Extract container metrics into Elasticsearch-compatible structure
    if [cpu_percent] {
      mutate {
        convert => {
          "cpu_percent" => "float"
          "memory_percent" => "float"
          "memory_usage_bytes" => "integer"
          "memory_limit_bytes" => "integer"
          "restart_count" => "integer"
          "network_rx_bytes" => "integer"
          "network_tx_bytes" => "integer"
        }
      }
    }

    # Alert threshold checks
    if [cpu_percent] and [cpu_percent] > 85 {
      mutate {
        add_field => { "alert_cpu" => true }
        add_tag => ["cpu_alert"]
      }
    }

    if [memory_percent] and [memory_percent] > 90 {
      mutate {
        add_field => { "alert_memory" => true }
        add_tag => ["memory_alert"]
      }
    }
  }

  # ─── Enrich Alert Events ────────────────────────────────
  if "alert-event" in [tags] {
    mutate {
      add_field => {
        "event_category" => "alert"
        "index_prefix" => "container-alerts"
      }
    }

    if [severity] == "critical" {
      mutate { add_tag => ["critical_alert"] }
    }
  }

  # ─── Enrich Log Events ──────────────────────────────────
  if "log-event" in [tags] {
    mutate {
      add_field => {
        "event_category" => "container_log"
        "index_prefix" => "container-logs"
      }
    }

    # Parse log level
    if [log_level] {
      mutate {
        uppercase => ["log_level"]
      }
    }

    # Detect error patterns
    if [message] =~ /(?i)(error|exception|fatal|panic|critical)/ {
      mutate {
        add_tag => ["error_detected"]
        add_field => { "contains_error" => true }
      }
    }
  }

  # ─── GeoIP enrichment (optional) ────────────────────────
  # if [client_ip] {
  #   geoip { source => "client_ip" }
  # }

  # ─── Common Cleanup ──────────────────────────────────────
  mutate {
    remove_field => ["@version", "host", "agent", "ecs"]
    add_field => {
      "pipeline" => "logstash-main"
      "environment" => "production"
    }
  }

  # ─── Remove internal Kafka metadata ─────────────────────
  mutate {
    remove_field => [
      "[@metadata][kafka][consumer_group]",
      "[@metadata][kafka][partition]",
      "[@metadata][kafka][offset]"
    ]
  }
}

# ============================================================
output {
  # ─── Health Events → Elasticsearch ─────────────────────
  if "health-event" in [tags] {
    elasticsearch {
      id => "es-health-output"
      hosts => ["http://${ELASTICSEARCH_HOST}"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "container-health-%{+YYYY.MM.dd}"
      document_type => "_doc"
      template_name => "container-health"
      template_overwrite => false
      retry_on_conflict => 3
      action => "index"
      ilm_enabled => true
      ilm_rollover_alias => "container-health"
      ilm_pattern => "{now/d}-000001"
      ilm_policy => "container-health-policy"
    }
  }

  # ─── Alert Events → Elasticsearch ──────────────────────
  if "alert-event" in [tags] {
    elasticsearch {
      id => "es-alert-output"
      hosts => ["http://${ELASTICSEARCH_HOST}"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "container-alerts-%{+YYYY.MM.dd}"
      document_type => "_doc"
      retry_on_conflict => 3
      action => "index"
    }
  }

  # ─── Log Events → Elasticsearch ────────────────────────
  if "log-event" in [tags] {
    elasticsearch {
      id => "es-log-output"
      hosts => ["http://${ELASTICSEARCH_HOST}"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "container-logs-%{+YYYY.MM.dd}"
      document_type => "_doc"
      retry_on_conflict => 3
      action => "index"
    }
  }

  # ─── Beats → Elasticsearch ─────────────────────────────
  if "beats" in [tags] {
    elasticsearch {
      id => "es-beats-output"
      hosts => ["http://${ELASTICSEARCH_HOST}"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "beats-%{+YYYY.MM.dd}"
    }
  }

  # ─── Dead Letter Queue (DLQ) fallback ──────────────────
  # Handled by Logstash's built-in DLQ when enabled in config

  # ─── Debug stdout (disable in production) ───────────────
  # stdout { codec => rubydebug }
}
